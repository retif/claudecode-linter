name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Self-lint
        run: node dist/index.js tests/fixtures/valid-plugin/ || true

      - name: Check replaceable dependencies
        run: npx tsx scripts/check-deps.ts

      - name: Find unused code
        run: npm run knip

      - name: Validate package publishing
        run: npx publint

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Extract contracts (dry-run)
        run: npx tsx scripts/extract-contracts.ts

      - name: Generate contracts
        run: npm run generate-contracts

      - name: Check for unstaged changes
        run: |
          # Ignore timestamp-only changes (extractedAt in JSON, date comment in TS)
          CHANGES=$(git diff --unified=0 -- . ':!contracts/claude-code-contracts.json' | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -v '^[+-]// Claude Code v' || true)
          JSON_CHANGES=$(git diff --unified=0 -- contracts/claude-code-contracts.json | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -v '"extractedAt"' || true)
          if [ -n "$CHANGES" ] || [ -n "$JSON_CHANGES" ]; then
            echo "Meaningful contract changes detected (these should be committed):"
            git --no-pager diff --stat
            exit 1
          fi
