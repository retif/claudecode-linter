name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Self-lint
        run: node dist/index.js tests/fixtures/valid-plugin/ || true

      - name: Check replaceable dependencies
        run: npx tsx scripts/check-deps.ts

      - name: Find unused code
        run: npm run knip

      - name: Validate package publishing
        run: npx publint

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Extract contracts (dry-run)
        run: npx tsx scripts/extract-contracts.ts

      - name: Generate contracts
        run: npm run generate-contracts

      - name: Check for contract value changes
        run: |
          # Compare contract values only (ignore timestamps, formatting, whitespace)
          # Extract just the contracts object from both old and new JSON, sort keys
          node -e '
            const fs = require("fs");
            const committed = JSON.parse(require("child_process").execSync("git show HEAD:contracts/claude-code-contracts.json", {encoding:"utf8"}));
            const current = JSON.parse(fs.readFileSync("contracts/claude-code-contracts.json", "utf8"));
            const norm = (obj) => JSON.stringify(obj.contracts, Object.keys(obj.contracts).sort());
            if (norm(committed) !== norm(current)) {
              console.log("Contract values changed — update needed:");
              for (const [k,v] of Object.entries(current.contracts)) {
                const old = JSON.stringify(committed.contracts[k]);
                const cur = JSON.stringify(v);
                if (old !== cur) console.log("  " + k + ": changed");
              }
              process.exit(1);
            }
            console.log("Contract values unchanged (only timestamp/formatting differs).");
          '
