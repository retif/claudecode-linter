name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Self-lint
        run: node dist/index.js tests/fixtures/valid-plugin/ || true

      - name: Check replaceable dependencies
        run: npx tsx scripts/check-deps.ts

      - name: Find unused code
        run: npm run knip

      - name: Validate package publishing
        run: npx publint
