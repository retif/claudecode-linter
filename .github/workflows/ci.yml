name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Self-lint
        run: node dist/index.js tests/fixtures/valid-plugin/ || true

      - name: Check replaceable dependencies
        run: npx tsx scripts/check-deps.ts

      - name: Find unused code
        run: npm run knip

      - name: Validate package publishing
        run: npx publint

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Extract contracts (dry-run)
        run: npx tsx scripts/extract-contracts.ts

      - name: Generate contracts
        run: npm run generate-contracts

      - name: Check for unstaged changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files were changed by generate-contracts (these should be committed in the PR)";
            git --no-pager status --porcelain;
            exit 1;
          fi
