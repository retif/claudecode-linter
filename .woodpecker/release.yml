# Woodpecker CI: Sync linter contracts with latest Claude Code version.
#
# Trigger: manual (will be cron in the future).
# Secrets required:
#   GITEA_TOKEN      — git push + npm publish + release creation

when:
  event: manual

steps:
  # ----------------------------------------------------------------
  # 1. Install + check for new version
  # ----------------------------------------------------------------
  check-version:
    image: node:20
    commands:
      - |
        set -e
        npm ci
        CURRENT=$(node -e "const d = require('./contracts/claude-code-contracts.json'); console.log(d.version)")
        LATEST=$(npm view @anthropic-ai/claude-code version)
        echo "Current: $CURRENT"
        echo "Latest:  $LATEST"
        if [ "$CURRENT" = "$LATEST" ]; then
          echo "Already up to date — nothing to do."
          exit 78
        fi
        echo "$LATEST" > .claude-code-version
        echo "Will update to v$LATEST"

  # ----------------------------------------------------------------
  # 2. Extract contracts + generate + build + test
  # ----------------------------------------------------------------
  build:
    image: node:20
    commands:
      - |
        set -e
        VERSION=$(cat .claude-code-version)
        echo "Extracting contracts for Claude Code v$VERSION..."
        npx tsx scripts/extract-contracts.ts --changelog
        npx tsx scripts/generate-contracts.ts
        npm run build
        npm test

  # ----------------------------------------------------------------
  # 3. Bump, commit, tag, push, publish, release
  #    (single step — Woodpecker only injects secrets into one step)
  # ----------------------------------------------------------------
  release:
    image: node:20
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -e
        VERSION=$(cat .claude-code-version)
        GITEA_HOST=$(echo "$CI_REPO_CLONE_URL" | sed 's|https://||;s|/.*||')
        GITEA_API="https://$GITEA_HOST/api/v1"
        REPO_PATH="$CI_REPO_OWNER/$CI_REPO_NAME"
        NPM_REGISTRY="https://$GITEA_HOST/api/packages/$CI_REPO_OWNER/npm"

        echo "==> Preparing release v$VERSION"

        # Bump package.json version
        node -e "
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.version = process.argv[1];
          fs.writeFileSync('package.json', JSON.stringify(p, null, '\t') + '\n');
        " "$VERSION"
        npm install --package-lock-only

        # Prepend changelog entry
        if [ -f CHANGELOG.md ]; then
          tail -n +2 CHANGELOG.md > CHANGELOG_OLD.md
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG_ENTRY.md >> CHANGELOG.md
          cat CHANGELOG_OLD.md >> CHANGELOG.md
          rm CHANGELOG_OLD.md
        else
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG_ENTRY.md >> CHANGELOG.md
        fi

        echo "--- CHANGELOG preview ---"
        head -40 CHANGELOG.md

        # Commit and tag
        git config user.name "Woodpecker CI"
        git config user.email "ci@woodpecker"
        git add -A
        git commit -m "release: sync with Claude Code v$VERSION"
        git tag -a "v$VERSION" -m "v$VERSION"

        # Push
        PUSH_URL=$(echo "$CI_REPO_CLONE_URL" | sed "s|://|://$GITEA_TOKEN@|")
        echo "==> Pushing v$VERSION..."
        git push "$PUSH_URL" HEAD:$CI_COMMIT_BRANCH --tags

        # Publish to Gitea npm registry (--ignore-scripts: build already ran)
        echo "==> Publishing to $NPM_REGISTRY..."
        echo "//$GITEA_HOST/api/packages/$CI_REPO_OWNER/npm/:_authToken=$GITEA_TOKEN" > "$HOME/.npmrc"
        npm publish --registry "$NPM_REGISTRY" --ignore-scripts

        # Create npm tarball for release attachment
        npm pack
        TARBALL=$(ls *.tgz)

        # Build release body with install instructions
        RELEASE_BODY=$(node -e "
          const changelog = require('fs').readFileSync('CHANGELOG_ENTRY.md', 'utf8');
          const install = [
            '### Install',
            '',
            '\`\`\`bash',
            '# Install from Gitea registry',
            'npm install claudecode-linter@$VERSION --registry $NPM_REGISTRY',
            '',
            '# Or configure registry permanently (one-time)',
            'npm config set //$GITEA_HOST/api/packages/$CI_REPO_OWNER/npm/:_authToken YOUR_TOKEN',
            'npm install claudecode-linter@$VERSION --registry $NPM_REGISTRY',
            '\`\`\`',
            '',
          ].join('\n');
          console.log(JSON.stringify(install + changelog));
        ")

        echo "==> Creating Gitea release v$VERSION..."
        curl -sf -X POST \
          -H "Authorization: token $GITEA_TOKEN" \
          -H "Content-Type: application/json" \
          "$GITEA_API/repos/$REPO_PATH/releases" \
          -d "{\"tag_name\":\"v$VERSION\",\"name\":\"v$VERSION\",\"body\":$RELEASE_BODY}"

        RELEASE_ID=$(curl -sf \
          -H "Authorization: token $GITEA_TOKEN" \
          "$GITEA_API/repos/$REPO_PATH/releases/tags/v$VERSION" \
          | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id))")

        echo "==> Attaching $TARBALL (release $RELEASE_ID)..."
        curl -sf -X POST \
          -H "Authorization: token $GITEA_TOKEN" \
          -F "attachment=@$(pwd)/$TARBALL;type=application/gzip" \
          "$GITEA_API/repos/$REPO_PATH/releases/$RELEASE_ID/assets?name=$TARBALL"

        # Cleanup CI-only files
        rm -f CHANGELOG_ENTRY.md .claude-code-version *.tgz "$HOME/.npmrc"
        echo "==> Released v$VERSION"
